mission_state: workspace://runs/deeploop/missions/bounded-support-example-mission/mission_state.json
loop_name: bounded-support-provider-loop
max_iterations: 16
max_consecutive_failures: 2
initial_task: Formalize the next bounded-support autonomous research step from the current mission state and continue until you can either complete it or emit a precise next-step handoff.
provider_selection:
  contract: configs/runtime/provider-selection-registry.yaml
  profile: deepseek-chat-control-plane
  mission_default:
    provider_family: openai-compatible-api
    backend: openai-compatible-api
    model:
      identifier: deepseek-chat
      selection_source: deepseek-chat-control-plane
  fallbacks:
    profile: no-cross-provider-fallback
agent:
  command:
    - python
    - workspace://repos/deeploop/scripts/runtime/invoke_provider_prompt.py
    - --prompt-file
    - "{prompt_path}"
    - --result-json-path
    - "{result_json_path}"
    - --sandbox-root
    - "{sandbox_root}"
    - --mission-state-path
    - "{mission_state_path}"
    - --target-repo
    - "{target_repo}"
  cwd: workspace://repos/target-project
notes:
  - Example config for running the recursive agent runtime against the DeepSeek API.
  - The `provider_selection` block declares mission/runtime intent separately from machine setup.
  - Current public runtime integration routes through the provider launcher surface using the openai-compatible-api adapter.
  - Keep OPENAI_API_KEY and OPENAI_BASE_URL outside the repo (set in the operator shell environment).
  - Adjust mission_state, loop_name, cwd, and optional model selection per mission.
  - The DeepLoop runtime handles the outer fresh-context loop; each iteration calls the API.
