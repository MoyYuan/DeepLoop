version: 1
placement_order:
  - layer: machine-defaults
    use_when:
      - policy is cross-repo
      - policy is stable and safety-relevant
    locations:
      - workspace://AGENTS.md
  - layer: deeploop-shared
    use_when:
      - policy is shared across research substrates
      - policy needs machine-readable automation support
    locations:
      - configs/
      - schemas/
      - docs/design/
  - layer: repo-local
    use_when:
      - policy differs by project or benchmark
      - scientific assumptions are repo-specific
    locations:
      - <repo>/AGENTS.md
      - <repo>/.github/copilot-instructions.md
      - <repo>/configs/
  - layer: scripts-and-templates
    use_when:
      - workflow is deterministic and repeatedly executed
    locations:
      - scripts/
      - Makefile
      - templates/
  - layer: mcp
    use_when:
      - repeated workflow friction cannot be solved well with local tools and GitHub-native integrations
  - layer: skill
    use_when:
      - a repeated high-level workflow deserves a named agent interface
decision_rules:
  - if a rule changes safety, evidence quality, or resource spending, prefer machine-defaults or deeploop-shared
  - if a rule changes scientific assumptions for one project, prefer repo-local
  - if a workflow is stable and repeated, codify it in scripts before inventing new prompts
