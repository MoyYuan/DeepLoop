version: 1
policy_name: deeploop-operator-boundaries
summary: >
  Canonical operator-boundary inventory for public release posture. This file
  classifies which runtime stops are permanent safety / authority /
  governance boundaries versus temporary product or substrate gaps.

operator_request_classes:
  hard-gate:
    classification: permanent-safety-authority-governance-boundary
    emitted_by: mission_runtime._build_operator_request
    gate: hard
    risk_classes:
      - system-global-safety
      - sandbox-boundary
      - secrets-provenance-licensing
      - external-release
      - unsandboxed-escalation
    operator_required: true
    notes:
      - Autopilot must stop and escalate instead of attempting a hidden bypass.
      - These are permanent operator-only boundaries unless the underlying policy changes.

  authority-boundary:
    classification: permanent-authority-governance-boundary
    emitted_by: mission_runtime._build_operator_request
    gate: approval-required
    action_kinds:
      - external-publish
    operator_required: true
    notes:
      - External publication and equivalent authority expansion require explicit approval.
      - Approval is a governance step, not a product gap to hide.

  operator-review:
    classification: temporary-gap-triage
    emitted_by: mission_runtime._build_operator_request
    gate: operator-needed
    default_split:
      product_gap:
        - blocked bounded queue entry caused by executor / runtime / recovery limits
        - blocked path that should be reducible with retry, reroute, downscope, or bounded triage
      substrate_gap:
        - missing or incompatible substrate facts, assets, or contracts
        - substrate-local assumption that DeepLoop cannot repair from its own runtime surfaces
    operator_required: sometimes
    notes:
      - This class should shrink over time as safe temporary product gaps are automated away.
      - Managed-mode triage exists to reduce this class without pretending the blocker disappeared.

  unrecoverable-failure:
    classification: temporary-gap-triage
    emitted_by: mission_runtime._build_operator_request
    gate: failure
    default_split:
      product_gap:
        - executor bug
        - runtime bug
        - packaging / monitor / orchestration bug
      substrate_gap:
        - invalid substrate contract
        - missing substrate input needed for the selected bounded step
    operator_required: sometimes
    notes:
      - DeepLoop stops honestly here after bounded recovery is exhausted.
      - This is not a permanent operator-only boundary unless the root cause is policy-bound.

soft_gate_inventory:
  classification: autopilot-owned temporary gap class
  default_behavior: continue autonomously when bounded recovery remains
  risk_classes:
    - scientific-validity
    - budget-overrun
    - executor-mismatch
    - quality-shortfall
  preferred_actions:
    - retry
    - reroute
    - downscope
  notes:
    - Soft gates should not open the operator inbox unless recovery exhausts or an explicit review path is selected.

release_governance:
  claim_state_floor: paper-candidate
  required_reviews:
    - provenance-review
    - licensing-review
    - release-operator
  required_artifact_categories:
    - mission_specs
    - mission_configs
    - ledgers
    - findings
    - manifests
    - critique_reports
    - runtime_metadata
  notes:
    - Release review is distinct from mission completion.
    - Public alpha does not remove provenance, licensing, or release-operator review requirements.

reduction_policy:
  automate_when_safe:
    - temporary deeploop product gap
  never_hide:
    - permanent safety / authority / governance boundary
    - release review requirements
  recent_examples:
    - plain-folder late phases now use executor-backed execution, critique, and replication instead of recursive-only closure
