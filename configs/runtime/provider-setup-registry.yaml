version: 1
contract_id: public-provider-setup
canonical_public_doc: docs/reference/provider-setup.md
first_class_provider_families:
  - openai-compatible-api
  - anthropic-api
  - local-transformers
  - vllm
scope:
  layer: machine-level-provider-availability
  includes:
    - required tools and Python modules
    - expected env var names and auth prerequisites
    - readiness expectations before mission execution
  excludes:
    - mission/runtime provider-model selection
    - per-mission model routing and fallback policy
    - checked-in secrets or credential values
related_runtime_surfaces:
  local_backend_policy: configs/runtime/backend-policy.yaml
  mission_runtime_selection: configs/runtime/provider-selection-registry.yaml
  recursive_agent_runtime_example: configs/runtime/recursive-agent-runtime-provider.example.yaml
  gate_2_runtime_lanes: configs/runtime/gate-2-runtime-lanes.yaml
provider_families:
  openai-compatible-api:
    display_name: OpenAI-compatible API providers
    public_contract_tier: first-class
    runtime_integration: implemented
    deployment_profiles:
      deepseek-chat:
        lane_id: deepseek-chat-api
        model_identifier: deepseek-chat
        endpoint_contract:
          path: /v1/chat/completions
          required_env_vars:
            - OPENAI_API_KEY
          optional_env_vars:
            - OPENAI_BASE_URL
            - OPENAI_MODEL
        environment_expectations:
          control_plane_env: deeploop
        manual_requirements:
          - set OPENAI_API_KEY outside the repo to your DeepSeek API key
          - set OPENAI_BASE_URL to https://api.deepseek.com/v1 (or leave unset if using the default)
        fallback_guidance:
          - DeepSeek API is fully OpenAI-compatible; the existing openai_compatible_adapter handles it
          - for reduced cost, consider deepseek-chat (V3) over deepseek-reasoner (R1) for routine control-plane tasks
      local-qwen3_5-9b-openai:
        lane_id: local-qwen-openai-compatible
        model_identifier: Qwen/Qwen3.5-9B
        endpoint_contract:
          path: /v1/chat/completions
          required_env_vars:
            - OPENAI_API_KEY
            - OPENAI_BASE_URL
          optional_env_vars:
            - OPENAI_ORG_ID
        environment_expectations:
          control_plane_env: deeploop
          serving_env: llm-or-host-equivalent
          suggested_serving_env_file: environment.llm.yml
        manual_requirements:
          - start a host-local OpenAI-compatible server that serves Qwen/Qwen3.5-9B and is reachable from the DeepLoop shell
          - set OPENAI_API_KEY outside the repo to whatever the local server expects; if it accepts a placeholder token, keep that placeholder external and manual too
          - keep model-weight access, accelerator provisioning, and server launch flags host-specific and outside repo automation
        fallback_guidance:
          - lower max context, max new tokens, or request concurrency before changing the lane definition
          - if the dedicated 9B Gate 2 profile is unstable on the host, record an explicit downgrade to qwen3_5-mid-fp16 or single-gpu-8b-9b-fp16 instead of silently switching provider families
      local-qwen3_5-0p8b-openai:
        lane_id: disposable-user-simulation
        model_identifier: Qwen/Qwen3.5-0.8B
        endpoint_contract:
          path: /v1/chat/completions
          required_env_vars:
            - OPENAI_API_KEY
            - OPENAI_BASE_URL
          optional_env_vars:
            - OPENAI_ORG_ID
        environment_expectations:
          control_plane_env: deeploop
          serving_env: llm-or-host-equivalent
          suggested_serving_env_file: environment.llm.yml
        manual_requirements:
          - start a host-local OpenAI-compatible server that serves Qwen/Qwen3.5-0.8B from the downloaded GGUF artifact Qwen3.5-0.8B-UD-Q4_K_XL.gguf
          - keep the downloaded GGUF path external/manual and point the local server at /home/moy/workspaces/models/Qwen3.5-0.8B-UD-Q4_K_XL.gguf or an operator-approved equivalent
          - set OPENAI_API_KEY outside the repo to whatever the local server expects; if it accepts a placeholder token, keep that placeholder external and manual too
        fallback_guidance:
          - lower max context, max new tokens, or request concurrency before changing the lane definition
          - do not silently switch this simulation-only lane to the release Gate 2 Qwen3.5-9B profile
    required_tools:
      - command: python
        purpose: control-plane entrypoint
      - command: curl
        purpose: optional manual HTTPS reachability check
    expected_env_vars:
      required:
        - OPENAI_API_KEY
      optional:
        - OPENAI_BASE_URL
        - OPENAI_ORG_ID
    auth_prerequisites:
      - provision API credentials outside the repo
    readiness_expectations:
      automated:
        - kind: env
          name: OPENAI_API_KEY
          expectation: set in the operator shell or runner environment
      manual:
        - if OPENAI_BASE_URL is set, confirm the endpoint is reachable over HTTPS
        - the public adapter currently covers prompt/result control-plane flows; it does not add Copilot-style tool execution
  anthropic-api:
    display_name: Anthropic API providers
    public_contract_tier: first-class
    runtime_integration: deferred
    required_tools:
      - command: python
        purpose: control-plane entrypoint
      - command: curl
        purpose: optional manual HTTPS reachability check
    expected_env_vars:
      required:
        - ANTHROPIC_API_KEY
      optional:
        - ANTHROPIC_BASE_URL
    auth_prerequisites:
      - provision API credentials outside the repo
    readiness_expectations:
      automated:
        - kind: env
          name: ANTHROPIC_API_KEY
          expectation: set in the operator shell or runner environment
      manual:
        - if ANTHROPIC_BASE_URL is set, confirm the endpoint is reachable over HTTPS
        - DeepLoop does not yet ship a public request adapter or mission/runtime selector for this family
  local-transformers:
    display_name: local-transformers
    public_contract_tier: first-class
    runtime_integration: implemented
    suggested_env_file: environment.llm.yml
    required_tools:
      - command: python
        purpose: local inference runtime
    required_python_modules:
      - torch
      - transformers
    expected_env_vars:
      required: []
      optional:
        - HF_HOME
        - TRANSFORMERS_CACHE
        - HUGGING_FACE_HUB_TOKEN
    auth_prerequisites:
      - if model weights are gated or private, provision access outside the repo
    readiness_expectations:
      automated:
        - kind: python-import
          modules:
            - torch
            - transformers
          expectation: imports succeed
      manual:
        - target model weights are reachable through a local path or configured cache/access path
  vllm:
    display_name: vllm
    public_contract_tier: first-class
    runtime_integration: implemented
    suggested_env_file: environment.llm.yml
    required_tools:
      - command: python
        purpose: local inference runtime
    required_python_modules:
      - torch
      - vllm
    expected_env_vars:
      required: []
      optional:
        - CUDA_VISIBLE_DEVICES
        - HF_HOME
        - HUGGING_FACE_HUB_TOKEN
    auth_prerequisites:
      - if model weights are gated or private, provision access outside the repo
    readiness_expectations:
      automated:
        - kind: python-import
          modules:
            - torch
            - vllm
          expectation: imports succeed
      manual:
        - the machine exposes a suitable accelerator/runtime for the intended vllm workload
        - backend-policy keeps vllm secondary until a mission explicitly chooses it
