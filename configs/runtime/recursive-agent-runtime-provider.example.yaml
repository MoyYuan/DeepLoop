mission_state: workspace://runs/deeploop/missions/bounded-support-example-mission/mission_state.json
loop_name: bounded-support-provider-loop
max_iterations: 16
max_consecutive_failures: 2
initial_task: Formalize the next bounded-support autonomous research step from the current mission state and continue until you can either complete it or emit a precise next-step handoff.
provider_selection:
  contract: configs/runtime/provider-selection-registry.yaml
  profile: gate2-coding-agent-copilot-gpt5-mini
  mission_default:
    provider_family: copilot-cli
    backend: copilot-cli
    model:
      alias: gpt-5-mini
      identifier: null
      selection_source: gate-2-coding-agent-lane
  loop_overrides:
    bounded-support-provider-loop:
      role_overrides:
        planner:
          model:
            alias: TBD_OPTIONAL_PLANNER_MODEL
        execution-operator:
          model:
            alias: TBD_OPTIONAL_EXECUTION_MODEL
      phase_overrides:
        critique:
          model:
            alias: TBD_OPTIONAL_CRITIQUE_MODEL
  fallbacks:
    profile: no-cross-provider-fallback
agent:
  command:
    - python
    - workspace://repos/deeploop/scripts/runtime/invoke_provider_prompt.py
    - --prompt-file
    - "{prompt_path}"
    - --result-json-path
    - "{result_json_path}"
    - --sandbox-root
    - "{sandbox_root}"
    - --mission-state-path
    - "{mission_state_path}"
    - --target-repo
    - "{target_repo}"
    - --allow-all
    - --no-ask-user
  cwd: workspace://repos/target-project
notes:
  - Example config for running the recursive agent runtime against the local `copilot` CLI.
  - The `provider_selection` block declares mission/runtime intent separately from machine setup.
  - Current public runtime integration can route through the provider launcher surface; today that launcher delegates `copilot-cli` requests to the Copilot adapter.
  - This example matches the current Gate 2 coding-agent release-validation lane by pinning the `gpt-5-mini` alias while keeping machine auth explicit outside repo automation.
  - Adjust mission_state, loop_name, cwd, and optional model selection per mission when you are not validating that Gate 2 lane.
  - The DeepLoop runtime handles the outer fresh-context loop; Copilot handles each bounded iteration.
