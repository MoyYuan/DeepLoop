name: Publish to PyPI

# Triggers from a published GitHub Release for a version tag (e.g. v0.1.0).
# Trusted Publishing (OIDC) is used — no API token secrets are required.
# Prerequisites: configure the tnetal/DeepLoop project on PyPI as a
# "trusted publisher" pointing to this workflow file.
on:
  release:
    types: [published]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate release tag matches project version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          import tomllib

          project = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]
          version = str(project["version"])
          release_tag = os.environ["RELEASE_TAG"].strip()
          expected_tag = f"v{version}"
          if release_tag != expected_tag:
              raise SystemExit(
                  f"Release tag `{release_tag}` does not match project.version `{version}` "
                  f"(expected `{expected_tag}`)."
              )
          print(f"Validated release tag {release_tag} matches project.version {version}.")
          PY

      - name: Install build backend
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # This environment gate lets repo admins require a manual approval step
    # before the package is pushed to PyPI.
    environment:
      name: pypi
      url: https://pypi.org/project/deeploop/
    permissions:
      # Required for OIDC trusted publishing — no API token needed.
      id-token: write

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
