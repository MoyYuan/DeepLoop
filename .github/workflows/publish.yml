name: Publish to PyPI

# Triggers on a version tag push (e.g. v0.1.0) or a GitHub Release creation.
# Trusted Publishing (OIDC) is used — no API token secrets are required.
# Prerequisites: configure the tnetal/DeepLoop project on PyPI as a
# "trusted publisher" pointing to this workflow file.
on:
  push:
    tags:
      - "v*"
  release:
    types: [published]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build backend
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # This environment gate lets repo admins require a manual approval step
    # before the package is pushed to PyPI.
    environment:
      name: pypi
      url: https://pypi.org/project/deeploop/
    permissions:
      # Required for OIDC trusted publishing — no API token needed.
      id-token: write

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
